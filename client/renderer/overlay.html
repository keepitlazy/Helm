<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' file: data:; style-src 'self' 'unsafe-inline';" />
  <title>截图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; cursor: crosshair; }
    body { background: #000; user-select: none; }

    /* The captured desktop, displayed full-screen. */
    #shot {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: fill;
      -webkit-user-drag: none;
    }

    /* Dim layer over the whole screen; the selection is "cut out" of it
       using four mask rectangles so the chosen region stays bright. */
    .mask {
      position: fixed;
      background: rgba(0, 0, 0, 0.5);
      pointer-events: none;
    }

    /* Selection outline. */
    #sel {
      position: fixed;
      border: 1px solid #06b6d4;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
      display: none;
      pointer-events: none;
    }

    /* Size readout above the selection. */
    #size {
      position: fixed;
      display: none;
      background: rgba(10, 14, 26, 0.92);
      color: #e4e7ee;
      font: 12px/1.4 ui-monospace, "Cascadia Code", Consolas, monospace;
      padding: 3px 8px;
      border-radius: 4px;
      pointer-events: none;
      white-space: nowrap;
      z-index: 10;
    }

    /* Confirm / cancel toolbar, shown after a region is drawn. */
    #bar {
      position: fixed;
      display: none;
      gap: 8px;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid #1e293b;
      border-radius: 10px;
      padding: 6px;
      z-index: 10;
    }
    #bar button {
      border: none;
      border-radius: 7px;
      padding: 6px 14px;
      font: 600 13px/1 -apple-system, "Microsoft YaHei", sans-serif;
      cursor: pointer;
    }
    #ok { background: #06b6d4; color: #06223a; }
    #cancel { background: #334155; color: #e2e8f0; }
    #ok:hover { background: #22d3ee; }
    #cancel:hover { background: #475569; }

    .hint {
      position: fixed;
      top: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(10, 14, 26, 0.85);
      color: #94a3b8;
      font: 13px/1 -apple-system, "Microsoft YaHei", sans-serif;
      padding: 8px 16px;
      border-radius: 20px;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <img id="shot" alt="" />

  <div class="mask" id="maskTop"></div>
  <div class="mask" id="maskBottom"></div>
  <div class="mask" id="maskLeft"></div>
  <div class="mask" id="maskRight"></div>

  <div id="sel"></div>
  <div id="size"></div>

  <div id="bar">
    <button id="cancel">取消 (Esc)</button>
    <button id="ok">复制 (Enter)</button>
  </div>

  <div class="hint" id="hint">拖动选择截图区域 · Enter 复制 · Esc 取消</div>

  <canvas id="work" hidden></canvas>
  <script src="overlay.js"></script>
</body>
</html>
